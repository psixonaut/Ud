<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>CRM Автосалон</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark mb-4">
        <div class="container">
            <a class="navbar-brand" href="{% url 'dashboard' %}">🚗 Автосалон</a>
            {% if user.is_authenticated %}
                <div class="navbar-nav ms-auto">
                    <span class="nav-item nav-link text-light">{{ user.employee_profile.fio }} ({{ user.employee_profile.rank }})</span>
                    <a class="nav-item nav-link text-danger" href="{% url 'logout' %}">Выход</a>
                </div>
            {% endif %}
        </div>
    </nav>
    <div class="container">
        {% if messages %}
            {% for message in messages %}
                <div class="alert alert-{{ message.tags }}">{{ message }}</div>
            {% endfor %}
        {% endif %}
        {% block content %}{% endblock %}
    </div>
</body>
</html>
